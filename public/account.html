<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — SomniWatch</title>
  <link rel="icon" href="/assets/favicon.ico" />
  <meta name="theme-color" content="#06080f" />
  <script>
    // Gate: must be logged in
    // Handled after Firebase loads
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06080f; --bg2: #0c0f1a; --bg3: #111520;
      --gold: #f0c060; --gold-dim: rgba(240,192,96,0.15);
      --cyan: #00d4ff; --text: #e8eaf0; --text-dim: #7a8199;
      --radius: 12px; --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: rgba(6,8,15,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; background: linear-gradient(135deg, var(--gold), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    .nav-back { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 0.8rem; text-decoration: none; transition: var(--transition); border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; padding: 6px 14px; }
    .nav-back:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    /* PAGE */
    .page { max-width: 560px; margin: 0 auto; padding: 40px 20px 80px; }

    /* Loading */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .spinner { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(240,192,96,0.2); border-top-color: var(--gold); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Not signed in */
    #not-signed-in { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; text-align: center; }
    #not-signed-in p { color: var(--text-dim); font-size: 0.9rem; }

    /* Content */
    #account-content { display: none; }

    /* Avatar header */
    .account-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
    .account-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--gold-dim); border: 2px solid rgba(240,192,96,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--gold); flex-shrink: 0; }
    .account-name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .account-email { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }

    /* Cards */
    .card { background: var(--bg2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px 22px; margin-bottom: 14px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }

    /* Plan card */
    .plan-row { display: flex; align-items: center; justify-content: space-between; }
    .plan-badge { display: flex; align-items: center; gap: 10px; }
    .plan-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--gold-dim); border: 1px solid rgba(240,192,96,0.25); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .plan-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: var(--gold); }
    .plan-desc { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
    .plan-expiry { font-size: 0.72rem; color: var(--text-dim); text-align: right; }
    .plan-expiry strong { color: var(--text); display: block; font-size: 0.85rem; }

    /* Feature list */
    .feature-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 14px; }
    .feature-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim); }
    .feature-item.has { color: var(--text); }
    .feature-check { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; flex-shrink: 0; }
    .feature-check.yes { background: rgba(74,222,128,0.15); color: #4ade80; }
    .feature-check.no { background: rgba(255,255,255,0.05); color: var(--text-dim); }

    /* Upgrade btn */
    .upgrade-btn { width: 100%; margin-top: 16px; padding: 13px; background: linear-gradient(135deg, #f0c060, #f0a03c); color: #06080f; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 800; cursor: pointer; transition: var(--transition); }
    .upgrade-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Info rows */
    .info-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.83rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-dim); }
    .info-value { color: var(--text); font-weight: 500; }

    /* Danger zone */
    .danger-btn { width: 100%; padding: 12px; background: none; border: 1px solid rgba(255,80,80,0.25); border-radius: 10px; color: #ff6060; font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: var(--transition); }
    .danger-btn:hover { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.4); }
    .sign-out-btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--text-dim); font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: var(--transition); margin-bottom: 10px; }
    .sign-out-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* Auth btn */
    .auth-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #f0c060, #f0a03c); color: #06080f; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 800; cursor: pointer; }

    /* Edit name */
    .edit-name-row { display: flex; gap: 8px; margin-top: 6px; }
    .edit-name-input { flex: 1; background: var(--bg3); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 8px 12px; outline: none; transition: var(--transition); }
    .edit-name-input:focus { border-color: rgba(240,192,96,0.4); }
    .edit-name-btn { background: var(--gold-dim); border: 1px solid rgba(240,192,96,0.25); border-radius: 8px; color: var(--gold); font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; padding: 8px 14px; cursor: pointer; white-space: nowrap; transition: var(--transition); }
    .edit-name-btn:hover { background: rgba(240,192,96,0.22); }

    /* Toast */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 10px 20px; font-size: 0.8rem; color: var(--text); display: none; z-index: 999; white-space: nowrap; }
    #toast.show { display: block; animation: toastPop 0.2s ease-out; }
    @keyframes toastPop { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    @media (max-width: 480px) { .page { padding: 24px 14px 60px; } .account-header { gap: 12px; } }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">SomniWatch</a>
  <a href="/" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to app
  </a>
</nav>

<div class="page">

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span style="color:var(--text-dim);font-size:0.82rem">Loading account…</span>
  </div>

  <!-- Not signed in -->
  <div id="not-signed-in">
    <div style="font-size:3rem">👤</div>
    <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800">Sign in to view your account</div>
    <p>Manage your plan, billing and settings here.</p>
    <button class="auth-btn" style="max-width:280px;margin-top:8px" onclick="window.location.href='/'">Go to SomniWatch</button>
  </div>

  <!-- Account content -->
  <div id="account-content">

    <!-- Header -->
    <div class="account-header">
      <div class="account-avatar" id="ac-avatar">?</div>
      <div>
        <div class="account-name" id="ac-name">—</div>
        <div class="account-email" id="ac-email">—</div>
      </div>
    </div>

    <!-- Plan card -->
    <div class="card" id="plan-card">
      <div class="card-title">Current Plan</div>
      <div class="plan-row">
        <div class="plan-badge">
          <div class="plan-icon" id="plan-icon">✨</div>
          <div>
            <div class="plan-name" id="plan-name">Free</div>
            <div class="plan-desc" id="plan-desc">Basic watch parties</div>
          </div>
        </div>
        <div class="plan-expiry" id="plan-expiry" style="display:none">
          <strong id="plan-expiry-date">—</strong>
          Renews
        </div>
      </div>
      <div class="feature-list" id="feature-list"></div>
      <button class="upgrade-btn" id="upgrade-btn" onclick="window.location.href='/'">⚡ Upgrade Plan</button>
    </div>

    <!-- Account info -->
    <div class="card">
      <div class="card-title">Account Info</div>
      <div class="info-row">
        <span class="info-label">Display name</span>
        <span class="info-value" id="info-displayname">—</span>
      </div>
      <div class="edit-name-row">
        <input class="edit-name-input" id="edit-name-input" type="text" placeholder="Enter display name" maxlength="24" />
        <button class="edit-name-btn" onclick="saveDisplayName()">Save</button>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value" id="info-email">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Member since</span>
        <span class="info-value" id="info-joined">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Sign-in method</span>
        <span class="info-value" id="info-provider">—</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <div class="card-title">Account Actions</div>
      <button class="sign-out-btn" onclick="doSignOut()">Sign Out</button>
      <button class="danger-btn" onclick="confirmDelete()">Delete Account</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyB38uXvzZRnfONHjM_qIBFBiG-Vw4rqXuI",
    authDomain: "somniwatch.firebaseapp.com",
    projectId: "somniwatch",
    storageBucket: "somniwatch.firebasestorage.app",
    messagingSenderId: "62892827078",
    appId: "1:62892827078:web:e2834805a39b73f319d2c7"
  };

  const MASTER_UID = 'k2t053MSV8OXmzKUcs83wMNu8nX2';

  const PLAN_META = {
    free:    { icon:'✨', name:'Free',          desc:'Basic watch parties',              color:'rgba(255,255,255,0.15)' },
    solo:    { icon:'💛', name:'Solo',          desc:'File upload, queue, 3 themes',     color:'rgba(240,192,96,0.2)' },
    couples: { icon:'❤️', name:'Couples',       desc:'Face cam, voice, 2 viewers',       color:'rgba(255,107,157,0.2)' },
    team:    { icon:'👥', name:'Team',          desc:'Up to 10 viewers, all features',   color:'rgba(0,212,255,0.2)' },
    master:  { icon:'★',  name:'Master',        desc:'Owner — all features, never expires', color:'rgba(240,192,96,0.25)' }
  };

  const PLAN_FEATURES = {
    free:    [{ label:'Watch parties',     has:true },  { label:'Chat & reactions',   has:true },  { label:'File upload',        has:false }, { label:'Face cam + voice',   has:false }, { label:'Premium themes',     has:false }],
    solo:    [{ label:'Watch parties',     has:true },  { label:'Chat & reactions',   has:true },  { label:'File upload',        has:true  }, { label:'Face cam + voice',   has:false }, { label:'Premium themes',     has:true  }],
    couples: [{ label:'Watch parties',     has:true },  { label:'Chat & reactions',   has:true },  { label:'File upload',        has:true  }, { label:'Face cam + voice',   has:true  }, { label:'Premium themes',     has:true  }],
    team:    [{ label:'Up to 10 viewers',  has:true },  { label:'Chat & reactions',   has:true },  { label:'File upload',        has:true  }, { label:'Face cam + voice',   has:true  }, { label:'Premium themes',     has:true  }],
    master:  [{ label:'All features',      has:true },  { label:'Never expires',       has:true },  { label:'File upload',        has:true  }, { label:'Face cam + voice',   has:true  }, { label:'Premium themes',     has:true  }]
  };

  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  auth.onAuthStateChanged(async user => {
    document.getElementById('loading').style.display = 'none';
    if (!user) {
      document.getElementById('not-signed-in').style.display = 'flex';
      return;
    }

    document.getElementById('account-content').style.display = 'block';

    // Header
    const email = user.email || '';
    document.getElementById('ac-email').textContent  = email;
    document.getElementById('info-email').textContent = email;

    // Load custom display name from Firestore first, fall back to Firebase displayName
    let customName = '';
    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists) customName = snap.data().displayName || '';
    } catch {}
    const name = customName || user.displayName || email.split('@')[0];
    document.getElementById('ac-avatar').textContent = name[0].toUpperCase();
    document.getElementById('ac-name').textContent   = name;
    document.getElementById('info-displayname').textContent = name;
    document.getElementById('edit-name-input').value = customName || user.displayName || '';

    // Member since
    const created = user.metadata.creationTime;
    if (created) {
      document.getElementById('info-joined').textContent = new Date(created).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }

    // Provider
    const provider = user.providerData[0]?.providerId || 'email';
    const providerLabels = { 'password':'Email & Password', 'google.com':'Google' };
    document.getElementById('info-provider').textContent = providerLabels[provider] || provider;

    // Master account — bypass Firestore entirely
    if (user.uid === MASTER_UID) {
      document.getElementById('plan-icon').textContent  = '★';
      document.getElementById('plan-icon').style.background = 'rgba(240,192,96,0.25)';
      document.getElementById('plan-name').textContent  = 'Master';
      document.getElementById('plan-name').style.color  = 'var(--gold)';
      document.getElementById('plan-desc').textContent  = 'Owner — all features, never expires';
      document.getElementById('feature-list').innerHTML = [
        'All features', 'Never expires', 'File upload', 'Face cam + voice', 'Premium themes'
      ].map(l => `<div class="feature-item has"><div class="feature-check yes">✓</div>${l}</div>`).join('');
      const ub = document.getElementById('upgrade-btn');
      if (ub) ub.style.display = 'none';
      return;
    }

    // Plan from Firestore
    let tier = 'free', expiresAt = null, active = false;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists) {
        const d = doc.data();
        tier      = d.tier || 'free';
        expiresAt = d.expiresAt ? new Date(d.expiresAt) : null;
        active    = d.active && (!expiresAt || expiresAt > new Date());
        if (!active) tier = 'free';
      }
    } catch(e) {}

    renderPlan(tier, expiresAt, active);
  });

  function renderPlan(tier, expiresAt, active) {
    const meta = PLAN_META[tier] || PLAN_META.free;
    const feats = PLAN_FEATURES[tier] || PLAN_FEATURES.free;

    document.getElementById('plan-icon').textContent  = meta.icon;
    document.getElementById('plan-icon').style.background = meta.color;
    document.getElementById('plan-name').textContent  = meta.name;
    document.getElementById('plan-desc').textContent  = meta.desc;

    if (expiresAt && active) {
      const expEl = document.getElementById('plan-expiry');
      expEl.style.display = 'block';
      document.getElementById('plan-expiry-date').textContent = expiresAt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }

    const list = document.getElementById('feature-list');
    list.innerHTML = feats.map(f => `
      <div class="feature-item ${f.has ? 'has' : ''}">
        <div class="feature-check ${f.has ? 'yes' : 'no'}">${f.has ? '✓' : '✕'}</div>
        ${f.label}
      </div>`).join('');

    const upgradeBtn = document.getElementById('upgrade-btn');
    if (tier !== 'free' && active) {
      upgradeBtn.textContent = '⚡ Upgrade / Change Plan';
    }
  }

  async function saveDisplayName() {
    const input = document.getElementById('edit-name-input');
    const name = input.value.trim();
    if (!name) { showToast('Enter a name first'); return; }
    const user = auth.currentUser;
    if (!user) return;
    try {
      await db.collection('users').doc(user.uid).set({ displayName: name }, { merge: true });
      await user.updateProfile({ displayName: name });
      document.getElementById('ac-name').textContent = name;
      document.getElementById('ac-avatar').textContent = name[0].toUpperCase();
      document.getElementById('info-displayname').textContent = name;
      showToast('Display name saved ✓');
    } catch(e) {
      showToast('Failed to save: ' + e.message);
    }
  }

  async function doSignOut() {
    await auth.signOut();
    showToast('Signed out');
    setTimeout(() => window.location.href = '/', 1000);
  }

  function confirmDelete() {
    if (confirm('Are you sure you want to delete your account? This cannot be undone.')) {
      auth.currentUser?.delete().then(() => {
        showToast('Account deleted');
        setTimeout(() => window.location.href = '/', 1200);
      }).catch(e => {
        if (e.code === 'auth/requires-recent-login') {
          alert('Please sign out and sign back in, then try again.');
        } else {
          alert(e.message);
        }
      });
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
