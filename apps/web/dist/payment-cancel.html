<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — SomniWatch</title>
  <link rel="icon" href="/assets/favicon.ico" />
  <meta name="theme-color" content="#06080f" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06080f; color: #e8eaf0; font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(240,192,96,0.05) 0%, transparent 70%);
    }
    .card {
      background: #0c0f1a; border: 1px solid rgba(255,255,255,0.07); border-radius: 24px;
      padding: 48px 40px; max-width: 460px; width: 100%; text-align: center;
      position: relative; z-index: 1;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; line-height: 1; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 0.88rem; color: #7a8199; line-height: 1.65; margin-bottom: 28px; }
    .plans { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; text-align: left; }
    .plan-row {
      display: flex; align-items: center; gap: 12px; background: #111520;
      border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 16px;
    }
    .plan-emoji { font-size: 1.2rem; flex-shrink: 0; }
    .plan-info { flex: 1; }
    .plan-title { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: #e8eaf0; }
    .plan-price { font-size: 0.72rem; color: #7a8199; margin-top: 2px; }
    .btn-primary {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #f0c060, #f0a03c);
      color: #06080f; border: none; border-radius: 100px; font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 800; cursor: pointer; margin-bottom: 10px; transition: 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost {
      width: 100%; padding: 13px; background: none; border: 1px solid rgba(255,255,255,0.08);
      color: #7a8199; border-radius: 100px; font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.18); color: #e8eaf0; }
    .logo { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 800;
      background: linear-gradient(135deg, #f0c060, #00d4ff); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SomniWatch</div>
    <div class="icon">😔</div>
    <h1>Payment cancelled</h1>
    <p>No worries — your free account is still active. You can upgrade any time to unlock premium features.</p>

    <div class="plans">
      <div class="plan-row">
        <div class="plan-emoji">💛</div>
        <div class="plan-info">
          <div class="plan-title">Solo</div>
          <div class="plan-price">File upload, queue, 3 premium themes</div>
        </div>
      </div>
      <div class="plan-row">
        <div class="plan-emoji">❤️</div>
        <div class="plan-info">
          <div class="plan-title">Couples</div>
          <div class="plan-price">Face cam + voice, 2 viewers</div>
        </div>
      </div>
      <div class="plan-row">
        <div class="plan-emoji">👥</div>
        <div class="plan-info">
          <div class="plan-title">Team</div>
          <div class="plan-price">Up to 10 viewers, all features</div>
        </div>
      </div>
    </div>

    <button class="btn-primary" onclick="window.location.href='/'">Try Again → Upgrade</button>
    <button class="btn-ghost" onclick="window.location.href='/'">Continue with Free Plan</button>
  </div>
</body>
</html>
